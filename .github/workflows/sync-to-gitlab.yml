name: Backup to GitLab

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 2 * * *"  # Daily backup at 2 AM UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_NAMESPACE: ${{ secrets.GITLAB_NAMESPACE }}
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Extract repository name from GITHUB_REPOSITORY
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          
          # Create GitLab project if it doesn't exist
          curl --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
               --data "name=${REPO_NAME}" \
               --data "visibility=private" \
               "https://${GITLAB_URL}/api/v4/projects" || true
          
          # Add GitLab remote and push
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${GITLAB_URL}/${GITLAB_NAMESPACE}/${REPO_NAME}.git"
          git push --mirror gitlab
