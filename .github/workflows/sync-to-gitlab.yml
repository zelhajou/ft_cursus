name: Backup to GitLab

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup GitLab Backup
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_NAMESPACE: ${{ secrets.GITLAB_NAMESPACE }}
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Extract repository name
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          
          # Get project ID
          PROJECT_ID=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
                           "https://${GITLAB_URL}/api/v4/projects/${GITLAB_NAMESPACE}%2F${REPO_NAME}" | \
                           jq -r '.id')
          
          echo "Project ID: $PROJECT_ID"
          
          if [ ! -z "$PROJECT_ID" ]; then
            # Temporarily unprotect the main branch
            echo "Unprotecting main branch..."
            curl -s --request DELETE \
                 --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
                 "https://${GITLAB_URL}/api/v4/projects/${PROJECT_ID}/protected_branches/main"
            
            # Add GitLab remote
            GITLAB_REPO_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_URL}/${GITLAB_NAMESPACE}/${REPO_NAME}.git"
            git remote add gitlab "$GITLAB_REPO_URL" || git remote set-url gitlab "$GITLAB_REPO_URL"
            
            # Push to GitLab
            echo "Pushing to GitLab..."
            git push --mirror gitlab
            
            # Re-protect the main branch
            echo "Re-protecting main branch..."
            curl -s --request POST \
                 --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
                 --header "Content-Type: application/json" \
                 --data '{
                   "name": "main",
                   "push_access_level": 40,
                   "merge_access_level": 40,
                   "allow_force_push": false
                 }' \
                 "https://${GITLAB_URL}/api/v4/projects/${PROJECT_ID}/protected_branches"
          else
            echo "Project not found. Creating new project..."
            # Create new project
            curl -s --request POST \
                 --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
                 --header "Content-Type: application/json" \
                 --data "{
                   \"name\": \"${REPO_NAME}\",
                   \"path\": \"${REPO_NAME}\",
                   \"visibility\": \"private\"
                 }" \
                 "https://${GITLAB_URL}/api/v4/projects"
            
            # Add remote and push after short delay
            sleep 5
            GITLAB_REPO_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_URL}/${GITLAB_NAMESPACE}/${REPO_NAME}.git"
            git remote add gitlab "$GITLAB_REPO_URL"
            git push --mirror gitlab
          fi
